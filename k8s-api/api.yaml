apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: w9-api
  namespace: demo
spec:
  replicas: 3
  strategy:
    canary:
      steps:
        - setWeight: 25
        - pause: { duration: 30s }
        - setWeight: 50
        - pause: { duration: 30s }
        - setWeight: 75
        - pause: { duration: 30s }
  revisionHistoryLimit: 2
  selector:
    matchLabels:
      app: w9-api
  template:
    metadata:
      labels:
        app: w9-api
    spec:
      containers:
        - name: w9-api
          image: w9-api:2
          imagePullPolicy: IfNotPresent
          env:
            - name: VERSION
              value: "v2"
          ports:
            - containerPort: 5000
              name: http
          livenessProbe:
            httpGet:
              path: /healthz
              port: 5000
          readinessProbe:
            httpGet:
              path: /healthz
              port: 5000
---
apiVersion: v1
kind: Service
metadata:
  name: w9-api
  namespace: demo
  labels:
    app: w9-api
spec:
  selector:
    app: w9-api
  ports:
    - name: http
      port: 5000
      targetPort: 5000
  type: NodePort
