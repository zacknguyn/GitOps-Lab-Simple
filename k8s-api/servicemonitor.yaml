apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: w9-api
  namespace: monitoring
  labels:
    release: kube-prometheus-stack
spec:
  selector:
    matchLabels:
      app: w9-api
  namespaceSelector:
    any: true
  endpoints:
    - port: http
      path: /metrics
      interval: 15s
