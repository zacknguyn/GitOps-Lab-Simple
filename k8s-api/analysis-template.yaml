apiVersion: argoproj.io/v1alpha1
kind: AnalysisTemplate
metadata:
  name: error-rate
  namespace: demo
spec:
  metrics:
    - name: success-rate
      initialDelay: 120s
      interval: 30s
      successCondition: "len(result) > 0 ? result[0] >= 0.95 : false"
      failureLimit: 3
      provider:
        prometheus:
          address: http://kube-prometheus-stack-prometheus.monitoring:9090
          query: |
            1 - ((sum(rate(flask_http_request_total{status=~"5..",namespace="demo"}[2m])) or vector(0))
                 / (sum(rate(flask_http_request_total{namespace="demo"}[2m])) or vector(0)))
