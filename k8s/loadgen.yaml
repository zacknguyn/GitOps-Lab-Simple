apiVersion: apps/v1
kind: Deployment
metadata:
  name: loadgen
  namespace: demo
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  replicas: 2
  selector:
    matchLabels:
      app: loadgen
  template:
    metadata:
      labels:
        app: loadgen
    spec:
      containers:
        - name: loadgen
          image: busybox:1.36
          imagePullPolicy: IfNotPresent
          command:
            - /bin/sh
            - -c
            - while true; do wget -qO- http://api:8080/ > /dev/null 2>&1; sleep 0.5; done
